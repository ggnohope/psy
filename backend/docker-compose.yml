services:
  postgres:
    image: postgres:16
    container_name: psy-postgres
    environment:
      POSTGRES_USER: psy
      POSTGRES_PASSWORD: psy
      POSTGRES_DB: psy
    ports:
      - "5433:5432"            # 5433 on host (5432 may be used by other projects)
    volumes:
      - psy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psy -d psy"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Full backend in Docker. Only starts with `--profile full` (dev normally uses `make server`/go run).
  server:
    profiles: ["full"]
    build: .
    container_name: psy-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://psy:psy@postgres:5432/psy?sslmode=disable"   # internal service host:port
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-885786271406-u79onredebj2udsoaen122vphe3pk8hd.apps.googleusercontent.com}"
    ports:
      - "8080:8080"

volumes:
  psy_pgdata:
