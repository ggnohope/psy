name: Release

# One tag releases BOTH platforms with the same version + build number.
#   git tag v1.2.0 && git push origin v1.2.0
# -> Android signed APK + iOS UNSIGNED IPA, both versioned 1.2.0 (build = run number),
#    attached to the GitHub Release "v1.2.0".
# The iOS IPA is unsigned (no paid Apple account): install via SideStore / AltStore /
# Sideloadly, which re-sign it with your own free Apple ID. See docs/IOS-SIDELOAD.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the Release once so the parallel android/ios jobs only append assets.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Create (or reuse) the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

  android:
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > psy-release.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=psy-release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK (version from tag)
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          export VERSION_NAME="${GITHUB_REF_NAME#v}"
          echo "Building Android $VERSION_NAME (code $VERSION_CODE)"
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true

      - name: Clean up signing secrets
        if: always()
        run: rm -f psy-release.jks keystore.properties

  ios:
    needs: prepare
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode (latest-stable on the runner — has a matching simulator runtime)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned IPA (version from tag)
        working-directory: ios
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="${{ github.run_number }}"
          echo "Building iOS $VERSION (build $BUILD) — unsigned (sideload)"

          xcodebuild \
            -project Psy.xcodeproj \
            -scheme Psy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          APP="build/Build/Products/Release-iphoneos/Psy.app"
          # Package the unsigned .app into an .ipa (Payload/ then zip).
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP" Payload/
          IPA="$RUNNER_TEMP/Psy-$VERSION-unsigned.ipa"
          zip -qr "$IPA" Payload
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"

      - name: Publish unsigned IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.IPA_PATH }}
          fail_on_unmatched_files: true
