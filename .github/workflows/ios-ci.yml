name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: PsyCore unit tests (pure logic, no simulator)
        working-directory: ios/PsyCore
        run: swift test

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available | grep -Eo 'iPhone 1[0-9]( Pro)?' | head -1)
          if [ -z "$NAME" ]; then NAME=$(xcrun simctl list devices available | grep -Eo 'iPhone [0-9]+' | head -1); fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $NAME"

      - name: Build + test (simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project Psy.xcodeproj \
            -scheme Psy \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO
